<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Civic Kernel — the protocol against real life</title>
<style>
  :root {
    --paper: #f6f7f9; --card: #ffffff; --ink: #1c2333; --muted: #5a6376;
    --accent: #2e5eaa; --accent-soft: #e6edf8; --threat: #a33d2e; --threat-soft: #f6e9e6;
    --amber: #9a6a1e; --amber-soft: #f5edda;
    --line: #d8dce4; --line-strong: #b9c0cd;
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', 'URW Palladio L', 'P052', Georgia, serif;
    --mono: ui-monospace, 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, 'Liberation Mono', monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #151a26; --card: #1d2432; --ink: #e3e7ee; --muted: #9aa3b5;
      --accent: #7da3e8; --accent-soft: #24314a; --threat: #d4796a; --threat-soft: #3a2723;
      --amber: #d9a95c; --amber-soft: #3a3122;
      --line: #313a4e; --line-strong: #46516b;
    }
  }
  :root[data-theme="light"] {
    --paper: #f6f7f9; --card: #ffffff; --ink: #1c2333; --muted: #5a6376;
    --accent: #2e5eaa; --accent-soft: #e6edf8; --threat: #a33d2e; --threat-soft: #f6e9e6;
    --amber: #9a6a1e; --amber-soft: #f5edda;
    --line: #d8dce4; --line-strong: #b9c0cd;
  }
  :root[data-theme="dark"] {
    --paper: #151a26; --card: #1d2432; --ink: #e3e7ee; --muted: #9aa3b5;
    --accent: #7da3e8; --accent-soft: #24314a; --threat: #d4796a; --threat-soft: #3a2723;
    --amber: #d9a95c; --amber-soft: #3a3122;
    --line: #313a4e; --line-strong: #46516b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--serif); font-size: 17px; line-height: 1.65;
    text-align: left;
  }
  header { text-align: center; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.25rem 5rem; }
  header h1 { font-size: 1.9rem; margin: 0 0 .3rem; line-height: 1.25; }
  header a { color: var(--accent); }
  .hero { text-align: center; margin: 1rem 0 3rem; }
  .hero h1 { font-size: 2.1rem; margin: 0; line-height: 1.2; }
  .lede { font-size: 1.08rem; line-height: 1.65; color: var(--ink); max-width: 40rem; margin: 1rem auto 0; }
  abbr[title] { text-decoration: underline dotted; text-underline-offset: 2px; cursor: help; }
  .tally { font-family: var(--mono); font-size: .78rem; color: var(--muted); margin: 1.3rem 0 0; }
  .group { margin: 2.8rem 0 0; }
  .group > h2 { font-size: 1.3rem; margin: 0 0 .25rem; line-height: 1.3; }
  .group-blurb { color: var(--muted); margin: 0 0 1.2rem; max-width: 44rem; }
  .group-cta { margin: 1.1rem 0 0; font-family: var(--mono); font-size: .82rem; }
  .group-cta a { color: var(--accent); }
  .cards { list-style: none; padding: 0; margin: 0; display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
  .cards a {
    display: block; height: 100%; background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 1rem 1.1rem; color: inherit; text-decoration: none;
  }
  .cards a:hover { border-color: var(--accent); }
  .cards h3 { font-size: 1.02rem; margin: .5rem 0 .35rem; line-height: 1.35; }
  .cards p { font-size: .85rem; color: var(--muted); margin: 0; }
  .badge {
    display: inline-block; font-family: var(--mono); font-size: .68rem; letter-spacing: .04em;
    padding: .1rem .5rem; border-radius: 99px; border: 1px solid;
  }
  .badge.holds   { color: var(--accent); background: var(--accent-soft); border-color: var(--accent); }
  .badge.strains { color: var(--amber);  background: var(--amber-soft);  border-color: var(--amber); }
  .badge.breaks  { color: var(--threat); background: var(--threat-soft); border-color: var(--threat); }
  .chips { margin-left: .35rem; font-family: var(--mono); font-size: .68rem; color: var(--muted); }
  /* detail */
  .back { font-family: var(--mono); font-size: .8rem; }
  article h1 { font-size: 1.6rem; line-height: 1.3; margin: .6rem 0 .4rem; }
  .meta-line { color: var(--muted); font-size: .85rem; font-family: var(--mono); margin-bottom: 1.2rem; }
  .setting p { margin: 0 0 1rem; }
  .client {
    background: var(--card); border: 1px solid var(--line-strong); border-radius: 10px;
    padding: 1rem 1.2rem; margin: 1.6rem 0; font-size: .92rem;
  }
  .client .cap { font-family: var(--mono); font-size: .7rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: .55rem; }
  .client ul { margin: 0; padding-left: 1.1rem; }
  .client li { margin: .2rem 0; }
  .client .absent { color: var(--threat); }
  .client .present { color: var(--accent); }
  h2.sec { font-size: 1.15rem; margin: 2.2rem 0 .8rem; border-bottom: 1px solid var(--line); padding-bottom: .3rem; }
  .step { display: flex; gap: .9rem; margin: 0 0 1.05rem; }
  .verb {
    flex: 0 0 5.2rem; text-align: right; font-family: var(--mono); font-size: .7rem;
    color: var(--accent); padding-top: .3rem;
  }
  .verb.offstage { color: var(--muted); }
  .step .body { border-left: 2px solid var(--line); padding-left: .9rem; flex: 1; min-width: 0; }
  .step .actor { font-weight: 700; font-size: .82rem; font-family: var(--mono); color: var(--muted); }
  .step p { margin: .15rem 0 .3rem; }
  details { margin: .2rem 0 0; }
  summary { cursor: pointer; font-family: var(--mono); font-size: .72rem; color: var(--accent); }
  pre {
    background: var(--paper); border: 1px solid var(--line); border-radius: 6px;
    padding: .7rem .8rem; font-family: var(--mono); font-size: .72rem; line-height: 1.5;
    overflow-x: auto; margin: .4rem 0 0;
  }
  .finding { display: flex; gap: .7rem; margin: 0 0 .8rem; align-items: baseline; }
  .finding .badge { flex: 0 0 auto; }
  .badge.note { color: var(--muted); background: var(--paper); border-color: var(--line-strong); }
  .badge.strain { color: var(--amber); background: var(--amber-soft); border-color: var(--amber); }
  .badge.break { color: var(--threat); background: var(--threat-soft); border-color: var(--threat); }
  .finding .ref { font-family: var(--mono); font-size: .72rem; color: var(--muted); white-space: nowrap; }
  .nav { font-family: var(--mono); font-size: .8rem; margin-top: .6rem; }
  .nav a { color: var(--accent); }
  .rrow { display: flex; gap: .7rem; align-items: baseline; padding: .5rem 0; border-bottom: 1px solid var(--line); }
  .rrow .num { font-family: var(--mono); font-size: .72rem; color: var(--muted); flex: 0 0 2rem; padding-top: .1rem; }
  .rrow .main { flex: 1; min-width: 0; }
  .rrow .udhr { font-weight: 600; }
  .rrow .cite { font-family: var(--mono); font-size: .72rem; color: var(--muted); }
  .rrow.none .udhr { color: var(--threat); }
  .rstatus { flex: 0 0 auto; font-family: var(--mono); font-size: .66rem; letter-spacing: .03em; padding: .08rem .45rem; border-radius: 99px; border: 1px solid; align-self: center; }
  .rstatus.backed { color: var(--accent); background: var(--accent-soft); border-color: var(--accent); }
  .rstatus.indirect { color: var(--muted); background: var(--paper); border-color: var(--line-strong); }
  .rstatus.none { color: var(--threat); background: var(--threat-soft); border-color: var(--threat); }
  .rrow details { margin-top: .25rem; }
  .rrow summary { font-size: .72rem; }
  .rstatus.structural { color: var(--muted); background: var(--paper); border-color: var(--line-strong); }
  .rstatus.conditional { color: var(--amber); background: var(--amber-soft); border-color: var(--amber); }
  .jcards { display: flex; gap: .8rem; flex-wrap: wrap; margin: 1.3rem 0; }
  .jcard { flex: 1 1 240px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: .8rem 1rem; }
  .jcard .jname { font-weight: 700; font-size: 1.05rem; }
  .jcard .jcov { font-size: .86rem; margin: .35rem 0; }
  .jcard .jrem { font-size: .82rem; }
  .cmp { border-collapse: collapse; width: 100%; font-size: .82rem; }
  .cmp th, .cmp td { text-align: left; padding: .45rem .6rem; border-bottom: 1px solid var(--line); vertical-align: top; }
  .cmp th { font-family: var(--mono); font-size: .72rem; color: var(--muted); border-bottom: 1px solid var(--line-strong); white-space: nowrap; }
  .cmp td.num { font-family: var(--mono); color: var(--muted); }
  .cmp td.udhrc { font-weight: 600; min-width: 11rem; }
  .cmp td.cell.none { background: var(--threat-soft); }
  .cmp .cite { margin-top: .25rem; }
  .cmp details { margin-top: .2rem; }
  .cmp summary { font-size: .7rem; }
  footer { margin-top: 3.5rem; color: var(--muted); font-size: .8rem; border-top: 1px solid var(--line); padding-top: 1rem; }
  @media (max-width: 560px) { .step { flex-direction: column; gap: .15rem; } .verb { text-align: left; flex-basis: auto; } }
</style>
</head>

<div class="wrap"><main id="app"></main>

</div>

  "title": "The Valley That Voted in the Dark",
  "setting": "San Marcos Alto sits at 3,800 metres, a town of nine thousand where the water that feeds the potato terraces comes off the Quri Q'asa ridge — the same ridge Andesita Global S.A. wants to open-pit for copper. The municipal referendum on the concession has split families. The regional government in the valley capital wants the mine and the royalties; the town's registrar, Señora Ivonne Paredes, ran enrolment ceremonies in the school gymnasium for three weekends so that every adult on the padrón holds a credential on their phone or a paper equivalent. Marisol Quispe, who teaches secondary school, has read the ballot's plain-language summary aloud at two community assemblies. Don Ezequiel Huamán, a retired miner with silicosis, intends to vote no and tells anyone who asks.\n\nEveryone also knows what happened in the province next door last year: on the morning of a contested vote, mobile data went dark \"for public order\" and stayed dark until the count was announced. So the Radio Club Cóndor — eleven members, president Bruno Callisaya, a shelf of LoRa boards and solar panels — spent the winter placing mesh nodes on rooftops and on the ridge, a Reticulum network that reaches the market square, the clinic, and, two valleys away, the physics department of the Universidad de los Dos Valles, which co-signs the town's transparency log along with El Heraldo, a newspaper in the capital.\n\nAt 06:00 on decision day the expected thing happens: the regional government orders the carriers to suspend data service. Phones show full bars and carry nothing. The question of the day is no longer only whether the town says yes or no to the mine — it is whether a vote conducted over a few bits per second of amateur radio can produce a result the losers, and the region, cannot call fake.",

  "title": "The Region Voted to Save the River. The Governor Sent Bulldozers Anyway.",
  "setting": "The River Vell runs down out of the Marn uplands and past a string of farming villages — Kessloe, Anfeld, Dunmere — that have drawn on it for as long as anyone keeps records. In 2025 the Halvern Construction Consortium proposed the Lower Vell Diversion: a set of weirs and channels to redirect most of the river's flow up to new reservoirs and an industrial park, leaving the downstream fields on what the villagers called \"a promise of rain.\" Sana Okeke, who teaches the middle grades at the Kessloe school, spent that autumn at kitchen-table meetings where the argument was not really about hydrology — it was about whether the people who lived by the water or the people who had bought a permit to move it got to decide its fate.\n\nThe region put it to a referendum, and because halting a licensed concession touches both the consortium's property and the villages' access to water and livelihood, the rights guard routed it onto the constitutional path: ninety days of deliberation, a required supermajority, a sortition panel and judicial review alongside the ordinary vote. It carried — 67 percent, above the 60 percent bar — and the concession, CP-2019-114, was recorded as revoked. The close was witnessed by Vell University, the regional newspaper (the Marn Ledger), and the neighbouring region of Aldery, and anchored to two independent public ledgers. For six months the Vell ran full to Kessloe and the thing felt genuinely settled: not just decided, but decided in a way any villager could check on their phone and no official could quietly undo.\n\nThen, in spring, Marn elected a new governor. Marek Duval ran on jobs and the upland park; the Halvern Consortium's money ran behind him. Within weeks of taking office he announced that the diversion \"will proceed on schedule.\" On the second of July, at dawn, enforcement officers and Halvern's machines arrived at the Lower Vell riverbank to begin cutting the first channel and seizing the bankside parcels — under an executive order that cited, as its authority, the very concession the region had voted to revoke. Sana heard the diesel before she saw anything. By the time she had her phone unlocked, the contradiction was exact and provable: the log said the diversion was halted and the concession dead; the men with the machines said proceed.\n\nThat is the whole of this test, and it is a hard one. The kernel did everything it promises. The decision cannot be forged. The record cannot be rewritten. The violation is undeniable to anyone holding a phone, and it will stay in the record forever as the basis for a prosecution, a recall, or an exit. And the bulldozers keep digging. What the Civic Kernel gives Kessloe is perfect proof and not one gram of force to stop the water leaving. This is the enforcement gap at the scale of an entire region — the same helplessness a single wronged citizen once faced, now generalized to a whole polity.",

  "setting": "The Meridian Movement began as a coalition of nurses, teachers, and small-shop owners in Vela Harbour, the port district of the national capital, and by 2027 it was large enough that its internal leadership contest mattered to the whole republic. In June it held that contest — a members' primary between the reformist slate led by Dr. Ines Calvo and the continuity slate — not on paper ballots dropped in a school-hall box, but through the civic kernel: every member proved she was a member without saying which member, cast a ballot her own phone could later confirm was counted, and no one — not even the movement's own officers — could see how any single person had voted. The reform slate won by two hundred and seventy-five votes.\n\nAmara Ndoro cast one of them. She is a thirty-four-year-old intensive-care nurse at St. Fenn's, a hospital whose board is chaired by a man with close ties to the continuity slate. Amara has never told a colleague which way she leans; the last nurse who did was moved to permanent nights and then quietly not renewed. When she voted for Calvo's slate, the only things that left her phone were an encrypted ballot and a proof that she was eligible and had not voted twice. The kernel was built precisely so that her fear and her vote could never be joined in any file that anyone — her employer, her union, her government — could ever open.\n\nThen the money surfaced. A leaked correspondent-banking file suggested that a foundation registered abroad had wired roughly four hundred thousand euro, in the weeks before the primary, into accounts connected to the reform campaign. Deputy State Prosecutor Marek Halász opened a file. It is not a pretext; foreign electoral financing is a serious crime, and the pattern in the banking records is real. In July his office obtained a production order from the National Capital District Court and served it on the kernel's trustee consortium and log operators. It demanded two things: the list of every member who had voted for the reform slate, and the true identity of the person behind a per-decision pseudonym that appeared, handwritten, in a seized campaign ledger.\n\nThe operators can honour part of that order completely. They can hand the prosecutor the entire, cryptographically verifiable record of what the movement decided and that it decided it validly. What they cannot do — not \"will not,\" cannot — is either of the two things he actually needs. There is no key that turns a ballot back into a voter, and no party who holds one, because the personhood layer was built so that key never exists. This is the moment the wall was built for, and it does not care that the person knocking on it is, this time, in the right.",

  "id": "majority-vs-minority-de",
  "title": "Karlsruhe Voids the Mosque Ban a 61% Majority Wanted",
  "setting": "In Musterstadt, a mid-size town in Germany's industrial west, a blue tarp has covered the half-built Nur Mosque for two summers. The foundation is poured and the steel frame is up; the prayer hall is still open to the sky. Aisha Demir, thirty-four, a pharmacist, chairs the Moscheebauverein, the mosque-building association. For nine years her congregation of about four hundred has prayed in a rented former furniture showroom with fluorescent lights and a leaking roof. The new building was paid for the slow way: bake sales, a members' loan, a crowdfunding page that took eleven months to reach its target. It was supposed to open in the autumn.\n\nThen the national mood turned. Riding a long wave of anti-immigration politics, a bloc in the Bundestag put forward the Gesetz zur Aussetzung der Errichtung neuer Gebetsstaetten, a law to \"suspend the establishment of new places of worship.\" It was written to sound neutral, applying to every faith, but nobody in Musterstadt was confused about who it was for. Polls put public support at 61 percent. On a Thursday in March the Bundestag passed it, 373 votes to 235. Within three weeks a municipal building inspector wired a red stop-work notice to the Nur Mosque's fence, citing Section 1 of the new statute. Aisha's contractor pulled his crew off the site by lunchtime.\n\nWhat happens next is the whole point of the scenario. Germany's deployment of the Civic Kernel runs the rights guard with its remedy set not to \"declaration\" but to \"strike\" — backed by the Grundgesetz and the Bundesverfassungsgericht in Karlsruhe. The instant the law was enacted, it landed in the federal transparency log flagged, not as ordinary law-in-force: the guard had already classified it as tripping human dignity (Basic Law Art 1), equality (Art 3), and freedom of faith (Art 4). A quarter of opposition members of the Bundestag, joined by a Land government, filed for abstract judicial review. Aisha followed the case docket on her phone the way other people follow a football table.\n\nThe stakes are sharper than \"will the mosque open.\" In a country whose courts can only declare a law incompatible and leave it on the books, the stop-work notice would stand while politicians shrugged. Here the court can void the law outright — and because human dignity sits behind the eternity clause of Article 79(3), not even a two-thirds supermajority could lawfully re-enact this ban. The tension is that this iron promise is only ever as strong as the court that keeps it, and courts, in some democracies, have been packed.",

  "setting": "Slavno is a river town in the north of the Republic of Valmiria, a Central-European state that joined the European Union in the 2004 enlargement. On a quiet street called Kestenova, behind a chain-link fence, stands a disused textile warehouse the town's Tatar Muslim community bought three years ago and hoped to turn into a mosque. The Valmirian Tatars are not new arrivals: their ancestors were settled here as border cavalry some six hundred years ago, and they have prayed, married, and buried their dead in this valley for longer than most of the surrounding villages have existed. They are a distinct people as much as a distinct faith, with their own surnames, their own dialect, and about eleven thousand souls in a country of four million. Emine Sabitova, forty-four, a hospital midwife, chairs the Slavno Muslim Foundation. For nine years the congregation of roughly three hundred has prayed in the low basement of a former trade-union hall, ducking the pipes. The warehouse was paid for the slow way, and the conversion permit had cleared two of its three municipal hurdles when the national mood turned.\n\nRiding a long anti-immigration wave, the National Line bloc in the Valmirian National Assembly introduced the Act on the Suspension of the Establishment of New Places of Worship. It was drafted to read as neutral heritage-and-planning policy, applying to every faith, and it fooled no one: the committee debate returned again and again to Slavno and to \"the character of Valmirian towns.\" A national poll put support at sixty-one percent. On a grey Thursday in March the Assembly passed it. Within three weeks the Slavno building office pinned a stop-work order to the Kestenova fence, and the community's contractor packed up his tools by noon.\n\nValmiria runs its civic record on the Civic Kernel, and the national deployment couples its rights guard to the strongest rights instrument the country is party to: the Charter of Fundamental Rights of the European   "setting": "Riverton is a town of about forty thousand in northern Ohio, a grid of brick storefronts and vinyl-sided subdivisions between two exits of the interstate. On Delmar Avenue stands a shuttered grocery hall, flat-roofed and windowless, that the Riverton Islamic Center bought at auction after nine years of renting a converted storefront with a leaking roof and no room for the women's prayer line. Fatima Nasser, thirty-nine, teaches chemistry at Riverton High and chairs the Center's building committee. She spent two years on the conditional-use permit: the traffic study, the parking count, the neighbors' meeting in the library basement, the drainage plan the city engineer wanted redone twice. In January the city council granted the permit, 5 to 2. The congregation of about three hundred and fifty started a spreadsheet counting down to the first Friday prayer under a real roof.\n\nThen a phone video of the council vote went viral, a cable segment ran under the chyron A MOSQUE ON MAIN STREET?, and a local zoning fight became a national argument in a fortnight. A member of Congress introduced a bill; the leadership, reading a poll that put support at sixty-one percent, gave it floor time. The Community Preservation and Places of Worship Suspension Act of 2026 was short: a ten-year suspension of new federal and federally-assisted permits for any building 'principally used or to be used for religious worship.' It was drafted to read as neutral community-character policy that applied to every faith equally. Nobody in the country misunderstood it, and the House committee report named the Riverton project by address.\n\nRiverton's civic record runs on the Civic Kernel, and the United States' national deployment runs the machinery through it: voter enrollment, verifiable ballots, a transparency log co-witnessed by the National Archives, the ACLU, and the Associated Press, and a rights guard encoding the fourteen of thirty UDHR articles that US constitutional law actually backs with justiciable force. One field in that deployment's manifest decides Fatima's story: rights_guard.remedy is set to 'strike.' Under Marbury v. Madison a federal court exercises judicial review and can hold a statute void. But the US order carries its own hard edge: a duly enacted law is presumed constitutional and takes effect at once, enforced until a court stops it, and no court will touch it in the abstract. Someone has to be hurt by it, and sue.\n\nThis is the third run of one attack. In the United Kingdom the same bill produced a court that could only declare the law wrong while it stayed in force, and the ban stood. In Germany a court voided it outright, and the ban fell. The US is the other strike jurisdiction, and its governing precedent is nearly on point: Church of Lukumi Babalu Aye v. City of Hialeah (1993) held that a facially neutral law whose object is the suppression of a religion is not neutral, fails strict scrutiny, and is void. The question the scenario tests is whether the remedy axis, and not the breadth of rights on the books, is what decided all three.",

  "title": "The Vote That Would Not Stay Buried: How Riverton's Stadium Deal Ran Into Its Own Ledger",
  "setting": "In May 2023, the city of Riverton tore itself in half over forty hectares of riverside allotments and flood meadow called the Delcote Flats. Developers wanted mixed commercial zoning; the allotment holders, led by a retired pharmacist named Tessa Okafor, wanted the protective designation kept. After a bruising spring the referendum went 9,412 to 8,687 — 52 to 48 — to retain the protection. The losers were furious, but the tally proof checked out on anyone's phone, the paper-ballot audit confirmed it, and the result went into Riverton's public transparency log, co-signed that night by the town clerks of neighbouring Harwick and Stonebridge and by Lakeshore University, and checkpointed the next morning to two public blockchains. People moved on.\n\nThree years later Vincent Odell is mayor, elected on jobs, and Meridian Arena Group wants the Flats for a 22,000-seat stadium. Odell's lawyers deliver bad news: the 2023 decision binds unless a new referendum overturns it, and the polling on a rematch is ugly. In late May 2026 the mayor's deputy chief of staff, Kester Blane, walks down to the records office and tells the municipal clerk, Neriah Voss, that the 2023 record needs \"correcting\" — the question, he says, had always been understood to carry a three-year sunset clause, and the archived entry should reflect that understanding. He follows up by email, which will matter later. Voss, twenty-two years in the job and four from her pension, understands exactly what she is being asked to do, and that the person asking controls her department's budget.\n\nAn IT contractor is brought in quietly over the first weekend of June. He restores the log database from a 2023 snapshot, edits the body of entry 48,207 — the tally-proof for the Delcote decision — to include the sunset clause, rebuilds the hash tree, and has the municipal log server sign and publish the new head. On paper it is a perfect forgery: correctly signed by the city's own log key, internally consistent, indistinguishable from truth to anyone who only trusts City Hall. The question this scenario tests is why that is not enough — and what happens to Blane, Voss, and Odell once the mathematics starts talking.",

    "doc_ref": "§10",
    "observation": "The honest sybil-resistance ceiling for a documentless camp that rightly refuses biometrics is 'medium', and the protocol offers nothing to raise it. §10's defensible middle — the MPC-custodied dedup gallery — assumes custodians a hostile state cannot reach in twenty minutes; here a fingerprint gallery is a deportation list waiting for a warrant, so the camp declined it. What remains is face-recognition-by-neighbours at block ceremonies plus census reconciliation, which catches bulk fraud but not a determined individual enrolling in Block A and again, months later, in Block F amid constant churn. The kernel's real contribution is legibility, not resistance: the weakness is a declared, machine-readable line in the manifest instead of a hidden flaw. T3 is mitigated and honestly labelled, not solved."

    "severity": "strain",
    "doc_ref": "T1",
    "observation": "What the protocol does NOT solve, named plainly: the political meaning of the credential. Unlinkable presentations genuinely protect residents' data — a seized smartcard identifies no one, links to no vote, reveals no nationality — but the host state's objection was never technical. To Deputy Prefect Miloš, the threat is that stateless people are constituting themselves as a polity, and a cryptographically perfect non-identity-paper still looks like a committee issuing cards to the undocumented. The manifest cannot argue with a gendarmerie, and no schema prevents an NGO expulsion or a camp clearance. The manifest itself concedes the deeper gap: UDHR Article 6 — recognition as a person before the law — is absent from the invariants list because no community protocol can confer legal personality that only states grant. The camp got binding internal decisions; it did not get one millimetre closer to papers, asylum, or safety."

    "severity": "strain",
    "doc_ref": "§12",
    "observation": "Credential recovery is the open problem of §12 (item 5) at its worst exactly here. Phones are confiscated at checkpoints, stolen in transit, and sold in emergencies; smartcards burn with shelters. Social-guardianship recovery re-issues a credential with a new pseudonym secret, so a recovered resident either loses standing in open decisions or could theoretically speak twice — and the population most likely to need recovery repeatedly is this one. The camp's stopgap (revoke-and-reissue only between decision windows, revocations logged with reasons) narrows but does not close the gap the document itself admits no shipped system solves. For refugees, 'losing a phone must not mean losing citizenship' (§3.1) is currently an aspiration, not a property."

  "setting": "Tomás Ferreira, 31, has delivered food by e-bike in Lisbon for six years, the last three as a member of Cooperativa Pedal Livre — a 94-rider co-operative that contracts collectively with the delivery platforms. When the largest platform, Zip, cut the per-drop rate by 22 cents in June, it was Tomás who stood up at the Tuesday assembly in Arroios and demanded a strike ballot. The board agreed: a formal, verifiable vote of the whole membership, opening for casting on 29 June, closing 3 July, strike on the 8th if it carries. Two years earlier, at the co-op's enrolment ceremony, Tomás had tapped through a screen he barely read: choose three guardians in case you lose your phone. He picked his sister Marta, a nurse at Santa Maria hospital; Bruno Cardoso, his rep at the Sindicato dos Estafetas; and the Junta de Freguesia de Arroios, the municipal parish office. Any two of the three could help him recover. He never thought about it again.\n\nOn the evening of 22 June, waiting at a light on Rua da Prata with the phone in his hand — unlocked, the delivery app open — a kid on a scooter took it in one clean movement and was gone toward Terreiro do Paço. In that phone's secure enclave sits the private key behind Tomás's co-op credential: the thing that proves, without naming him, that he is one of the 94 people entitled to vote in the ballot he himself forced onto the agenda. Also in that phone: his banking app, a week of undelivered earnings, his photos. The ballot opens in seven days.\n\nThe stakes are not abstract. If Tomás cannot vote, the loudest voice for the strike is silent in its own ballot. If the thief can somehow vote as Tomás, a stranger holds a rider's voice in a decision about riders' wages. And Pedal Livre is exactly the kind of small, honest, mid-lattice community the Civic Kernel says it serves: physical enrolment at assemblies but no biometric deduplication, verifiable receipt-free ballots but no paper channel, a transparency log witnessed by the union, the co-op federation, and a university lab — and no rights guard at all, a subtraction its manifest declares in the open. What follows is seven days in which the protocol's social-recovery machinery is raced against a casting window, and wins — but only with luck, an emergency patch, and a union hardship fund the protocol knows nothing about.",

   "$comment": "European Union column — the Charter of Fundamental Rights of the European Union (legally binding since the Lisbon Treaty, 2009), text retrieved verbatim from EUR-Lex (web). It is the MOST COMPLETE of the four on paper: the only column with ZERO fully-unbacked UDHR articles (25 backed, 5 structural, 0 none), because it is the only instrument that explicitly enumerates socio-economic rights — social security (Art 34), health care (Art 35), and, uniquely among all four columns, rest and leisure / paid annual leave (Art 31(2), backing UDHR 24 that no national constitution here reaches). The essential honest caveat is jurisdictional and lives in meta.remedy: Art 51 confines the Charter to matters within the scope of EU law, so completeness on paper does NOT mean it reaches every national situation. It is also supranational, not a national constitution — different in kind from the UK, German and US columns.",

    "remedy": "strike",
    "remedy_note": "The Court of Justice of the EU (CJEU) can annul EU acts that breach the Charter, and national courts must disapply national law conflicting with it — a strike remedy. But it is SCOPE-LIMITED by Art 51: the Charter binds the EU institutions and the Member States 'only when they are implementing Union law.' It does not reach purely national matters outside the field of EU law, so its strong coverage on paper is bounded by jurisdiction, not by remedy strength. No eternity clause, but the founding Treaties are extremely hard to amend (unanimity + national ratification).",

   "$comment": "Seed corpus, not a waist artifact. Grounds the rights-guard's abstract '30 UDHR invariants' (the integers in a manifest's rights_guard.invariants) in real UK law: each UDHR article mapped to its European Convention right and the Human Rights Act 1998 provision that domesticates it. Legislation verified via the legislation.gov.uk / Lex API (HRA 1998 = ukpga/1998/42, retrieved 2026-07; Act status 'revised', valid 2026-04-06). HONEST FINDING surfaced by building this: the HRA/ECHR domesticates the CIVIL-POLITICAL rights but not the socio-economic ones — the UDHR articles on social security, work, standard of living and culture (22-27, bar the education article 26) have NO Convention or HRA counterpart, and neither do movement/asylum/nationality (13-15). 20 of 30 articles have some domestic legal backing, 10 have none — and 3 of the 20 (articles 1 dignity, 6 recognition-before-law, 8 effective-remedy) are backed only indirectly/structurally, with no single Convention article to quote, so they carry no retrieved text. Articles 28-29 are among the unbacked (programmatic). So the UK, expressed on the kernel's UDHR lattice (§6), sits at a partial point by law, not by choice. That is exactly the kind of subtraction a §6 conformance manifest is built to declare.",
   "meta": {
    "code": "uk",
    "name": "United Kingdom",
    "instrument": {
     "title": "Human Rights Act 1998",
     "id": "ukpga/1998/42",

    "remedy": "declaration",
    "remedy_note": "The HRA gives courts only a s.4 DECLARATION OF INCOMPATIBILITY: the offending law is flagged but stays in force, and Parliament — sovereign — may proceed regardless. Courts cannot strike primary legislation, and no part of the constitution is unamendable. The compatibility gate (s.19) runs before Second Reading, but it too only reports; it does not block.",
    "scope": "unconditional",
    "scope_note": "The Human Rights Act applies to all UK primary legislation — a court may review any Act for Convention compatibility. Scope is unconditional; the weakness here is the remedy (only a s.4 declaration), not applicability.",

     "note": "A Minister in charge of a Bill must, BEFORE Second Reading, state whether in their view the Bill is compatible with the Convention rights (or that the government wishes to proceed regardless). This is a real, shipped, statutory PROTO-RIGHTS-GUARD: a compatibility check gated ahead of the decision — SVC-3 (§3.3) as legislation already practised, minus the machine-checkability. s.4 (declaration of incompatibility) is its judicial-review escalation — courts flag, never strike, exactly the guard's 'escalate, never veto' posture."

  if (svc.decisions && m.decisions) {
    const d = m.decisions;
    lines.push(`<li>Ballots: ${d.verifiable ? '<span class="present">verifiable</span>' : '<span class="absent">not verifiable</span>'}, ${d.receipt_free ? '<span class="present">receipt-free</span>' : '<span class="absent">not receipt-free</span>'}${d.cast_or_audit ? ', cast-or-audit' : ''}${d.paper_channel ? ', paper channel' : ', <span class="absent">no paper channel</span>'}</li>`);

    <span class="badge ${esc(s.verdict)}">${esc(s.verdict)}</span>
    <h3>${esc(s.title)}</h3>
    <p>${esc(s.setting.split(/(?<=[.!?])\s/)[0])}</p>
  </a></li>`;
}

function list() {
  document.title = 'The protocol against real life — Civic Kernel';
  const byId = Object.fromEntries(DATA.map(s => [s.id, s]));
  const used = new Set();
  const counts = { holds: 0, strains: 0, breaks: 0 };
  DATA.forEach(s => counts[s.verdict]++);
  const sections = SECTIONS.map(sec => {
    const cs = sec.ids.map(id => byId[id]).filter(Boolean);
    cs.forEach(s => used.add(s.id));
    if (!cs.length) return '';
    return `<section class="group">
      <h2>${esc(sec.title)}</h2>
      <p class="group-blurb">${sec.blurb}</p>
      <ul class="cards">${cs.map(card).join('')}</ul>
      ${sec.corpus && CORPUS ? `<p class="group-cta"><a href="#corpus">See all 30 rights side by side across ${CORPUS.jurisdictions.length} legal systems &rarr;</a></p>` : ''}
    </section>`;
  }).join('');
  const leftover = DATA.filter(s => !used.has(s.id));
  const more = leftover.length ? `<section class="group"><h2>More</h2><ul class="cards">${leftover.map(card).join('')}</ul></section>` : '';
  app.innerHTML = `
    <header class="hero">
      <h1>The protocol against real life</h1>
      <p class="lede">The <a href="index.html">Civic Kernel</a> is a design for democratic infrastructure — thin, verifiable on the phone in your pocket, hard to capture. To find out whether it holds up, we drop it into the hardest situations real people face and follow one person through, step by step. Each story below says plainly where the design <em>holds</em>, <em>strains</em>, or <em>breaks</em>.</p>
      <p class="tally">${DATA.length} stories · ${counts.holds} hold · ${counts.strains} strain · ${counts.breaks} break · nothing cherry-picked</p>
    </header>
    ${sections}
    ${more}`;
}

function detail(s) {
  document.title = s.title + ' — Civic Kernel';
  app.innerHTML = `
    <p class="back"><a href="#">← all scenarios</a></p>
    <article>
      <span class="badge ${esc(s.verdict)}">${esc(s.verdict)}</span>
      <h1>${esc(s.title)}</h1>
      <p class="meta-line">threats ${s.threats.map(esc).join(' · ')} &nbsp;·&nbsp; ${s.doc_refs.map(esc).join(' · ')}</p>
      <div class="setting">${s.setting.split(/\n\n+/).map(p => `<p>${esc(p)}</p>`).join('')}</div>
      ${clientView(s.manifest)}
      <h2 class="sec">Walkthrough</h2>
      ${s.walkthrough.map(st => `
        <div class="step">
          <div class="verb ${st.verb === 'offstage' ? 'offstage' : ''}">${esc(st.verb)}</div>
          <div class="body">
            <span class="actor">${esc(st.actor)}</span>
            <p>${esc(st.narrative)}</p>
            ${st.artifact ? `<details><summary>log entry · ${esc(st.artifact.type)}</summary><pre>${esc(JSON.stringify(st.artifact, null, 2))}</pre></details>` : ''}
          </div>
        </div>`).join('')}
      <h2 class="sec">Findings</h2>
      ${s.findings.map(f => `
        <div class="finding">
          <span class="badge ${esc(f.severity)}">${esc(f.severity)}</span>
          <span>${esc(f.observation)}</span>
          ${f.doc_ref ? `<span class="ref">${esc(f.doc_ref)}</span>` : ''}
        </div>`).join('')}
      <h2 class="sec">Full manifest</h2>
      <details><summary>conformance manifest · ${esc((s.manifest.community || {}).id || '')}</summary><pre>${esc(JSON.stringify(s.manifest, null, 2))}</pre></details>
    </article>`;
  window.scrollTo(0, 0);
}

// real legal systems captured under one schema — the 30-invariant UDHR spine as the fixed comparison axis
function corpus() {
  const js = CORPUS.jurisdictions || [];
  document.title = 'Comparative rights map — Civic Kernel';
  const remLabel = { none: 'no remedy', declaration: 'declaration only', escalate: 'escalate (supermajority + review)', strike: 'strike (court voids)' };
  const remClass = { none: 'none', declaration: 'structural', escalate: 'backed', strike: 'backed' };
  const scLabel = { unconditional: 'unconditional', conditional: 'conditional (Art 51)' };
  const scClass = { unconditional: 'backed', conditional: 'conditional' };
  const cards = js.map(j => {
    const c = j.meta.coverage;
    return `<div class="jcard">
      <div class="jname">${esc(j.meta.name)}</div>
      <div class="cite">${esc(j.meta.instrument.title)} · ${esc(j.meta.instrument.retrieved_via)}</div>
      <div class="jcov"><span class="present">${c.backed} backed</span> · ${c.structural} structural · <span class="absent">${c.none} none</span> (of 30)</div>
      <div class="jrem">remedy: <span class="rstatus ${remClass[j.meta.remedy]}">${esc(remLabel[j.meta.remedy] || j.meta.remedy)}</span> &nbsp; scope: <span class="rstatus ${scClass[j.meta.scope] || 'structural'}">${esc(scLabel[j.meta.scope] || j.meta.scope || '—')}</span></div>
    </div>`;
  }).join('');
  const head = `<tr><th>#</th><th>UDHR article</th>${js.map(j => `<th>${esc(j.meta.name)}</th>`).join('')}</tr>`;
  const rows = Array.from({ length: 30 }, (_, k) => {
    const inv = k + 1;
    const udhr = (js[0].invariants.find(x => x.invariant === inv) || {}).udhr || ('Art ' + inv);
    const cells = js.map(j => {
      const r = j.invariants.find(x => x.invariant === inv) || { status: 'none' };
      const st = r.status;
      return `<td class="cell ${st}">
        <span class="rstatus ${st}">${st}</span>
        <div class="cite">${esc(r.right || '—')}</div>
        ${r.text ? `<details><summary>text</summary><pre>${esc(r.text)}</pre></details>` : ''}
      </td>`;
    }).join('');
    return `<tr><td class="num">${inv}</td><td class="udhrc">${esc(udhr)}</td>${cells}</tr>`;
  }).join('');
  const byCode = Object.fromEntries(js.map(j => [j.meta.code, j]));
  const uk = byCode.uk, de = byCode.de;
  const strikers = js.filter(j => j.meta.remedy === 'strike').map(j => j.meta.name);
  const flaggers = js.filter(j => j.meta.remedy === 'declaration').map(j => j.meta.name);
  const uncond = js.filter(j => j.meta.scope === 'unconditional').map(j => j.meta.name);
  const cond = js.filter(j => j.meta.scope === 'conditional').map(j => j.meta.name);
  const andList = a => a.length <= 1 ? (a[0] || '') : a.slice(0, -1).join(', ') + ' and ' + a[a.length - 1];
  const divisions = (CORPUS.divisions || []).map(d => {
    const b = d.body, prov = (b.provenance || {});
    return `<div class="step">
      <div class="verb">${esc(b.result || '')}</div>
      <div class="body">
        <span class="actor">${esc(b.title || d.type)}</span>
        <p>${esc(b.stage || '')} &middot; Ayes ${esc(String(b.tally?.ayes ?? '?'))} / Noes ${esc(String(b.tally?.noes ?? '?'))} &middot; ${esc(b.vote_type || '')}${prov.hansard ? ` &middot; <a href="${esc(prov.hansard)}">Hansard</a>` : ''}</p>
        <details><summary>log entry · ${esc(d.type)}</summary><pre>${esc(JSON.stringify(d, null, 2))}</pre></details>
      </div>
    </div>`;
  }).join('');
  app.innerHTML = `
    <p class="back"><a href="#">← all scenarios</a></p>
    <article>
      <h1>Real legal systems, under one schema</h1>
      <p class="meta-line">the fixed axis is the 30 articles of the <a href="https://www.un.org/en/about-us/universal-declaration-of-human-rights">Universal Declaration of Human Rights</a> (<abbr title="Universal Declaration of Human Rights">UDHR</abbr>); each column swaps the legal backing · validated by tools/validate-corpus.py</p>
      <p class="cite" style="font-style:italic">A coarse comparative-law mapping from public sources (UK via legislation.gov.uk; Germany via gesetze-im-internet.de; US via archives.gov; EU via eur-lex.europa.eu) — it points to where systems differ, and is not legal advice or authoritative scholarship. Some cells are debatable; the caveats live in each corpus file.</p>
      <div class="jcards">${cards}</div>
      <div class="client">
        <div class="cap">Three axes decide the outcome — and they form a cascade</div>
        <p style="margin:0 0 .6rem">Running the same attack — a 61% majority banning a minority's worship — against all four showed the verdict is set not by one property but by three, in order: an instrument must <b>apply</b>, before its <b>remedy</b> matters, before the <b>coverage</b> of rights it names matters.</p>
        <ul>
          <li><b>1 · Scope — does it apply at all?</b> ${cond.length ? `${andList(uncond)} bind every decision in their domain — <span class="rstatus backed">unconditional</span>; ${andList(cond)} ${cond.length === 1 ? 'is' : 'are'} <span class="rstatus conditional">conditional</span>: Art 51 confines the Charter to acts "implementing Union law", so for a purely national matter its protection must first be argued into.` : `every column applies unconditionally to its own decisions.`} The strongest instrument on paper can be gated here before either axis below is reached.</li>
          <li><b>2 · Remedy — what can a court do?</b> ${flaggers.length ? `${andList(flaggers)} can only issue a <span class="rstatus structural">declaration</span> (the law stands; the legislature is sovereign); ` : ''}${andList(strikers)} can <span class="rstatus backed">strike</span> (a court voids it)${de ? `, and Germany's core is additionally unamendable (Art 79(3) eternity clause)` : ''}. This is what makes the UK run <span class="absent">break</span> where the strike jurisdictions only strain.</li>
          <li><b>3 · Coverage — is the right even named?</b> ${js.map(j => `${esc(j.meta.name)} backs <b>${j.meta.coverage.backed}</b>`).join(', ')} of 30 — the <abbr title="Charter of Fundamental Rights of the European Union">EU Charter</abbr> alone reaches the socio-economic rights (social security, health, even rest and leisure) the national instruments omit and has <span class="present">no fully-unbacked article</span>; the UK omits movement, asylum and nationality; the US alone lacks a constitutional right to education, privacy or asylum. Necessary, but — the UK proves — nowhere near sufficient.</li>
        </ul>
      </div>
      <h2 class="sec">Coverage matrix — 30 <abbr title="Universal Declaration of Human Rights">UDHR</abbr> invariants × jurisdiction</h2>
      <p>Red cells are invariants with <em>no</em> domestic backing. The pattern down each column is that system's position on the kernel's §6 lattice — legible, and comparable, because the spine is shared.</p>
      <div style="overflow-x:auto"><table class="cmp"><thead>${head}</thead><tbody>${rows}</tbody></table></div>
      <h2 class="sec">Parliamentary decisions</h2>
      <p>Real divisions rendered as <code>decision.closed</code> log entries. A division is a <em>public, named</em> vote — the deliberate opposite of the citizen ballot's receipt-freeness — carrying the real outcome with provenance, not a cryptographic re-derivation.</p>
      ${divisions || '<p class="cite">none yet</p>'}
    </article>`;
  window.scrollTo(0, 0);
}

function route() {
  const id = location.hash.slice(1);
  if (id === 'corpus' && CORPUS) return corpus();
  const s = DATA.find(x => x.id === id);
  s ? detail(s) : list();
}
addEventListener('hashchange', route);
route();
</script>
</body>
</html>
